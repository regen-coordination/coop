name: Publish Builder Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

jobs:
  publish-builder-release:
    name: Publish builder-latest prerelease
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
      && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    concurrency:
      group: builder-release-main
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Validate public-release store readiness
        run: |
          bun run ./scripts/run-with-env-profile.ts public-release -- bun run validate:store-readiness

      - name: Package builder release
        run: |
          bun run ./scripts/package-extension.ts public-release --filename "coop-extension-builder-latest.zip"

      - name: Write builder release notes
        env:
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA="$(git rev-parse --short "${HEAD_SHA}")"
          COMMIT_DATE="$(git show -s --format=%cI "${HEAD_SHA}")"
          COMMIT_SUBJECT="$(git log -1 --pretty=%s "${HEAD_SHA}")"
          cat <<EOF > builder-release-notes.md
          Fresh builder package from the latest green merge to \`main\`.

          - Commit: \`${SHORT_SHA}\`
          - Commit date: \`${COMMIT_DATE}\`
          - Subject: ${COMMIT_SUBJECT}
          - Source CI run: ${CI_RUN_URL}

          Download the packaged extension zip below and follow the install guide at https://docs.coop.town/builder/getting-started.
          EOF

      - name: Publish builder prerelease
        uses: softprops/action-gh-release@v2
        with:
          body_path: builder-release-notes.md
          fail_on_unmatched_files: true
          files: packages/extension/dist/archives/coop-extension-builder-latest.zip
          make_latest: false
          name: Builder Latest (main)
          overwrite_files: true
          prerelease: true
          tag_name: builder-latest
          target_commitish: ${{ github.event.workflow_run.head_sha }}

      - name: Move builder-latest tag
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa builder-latest "${HEAD_SHA}" -m "Builder latest for ${HEAD_SHA}"
          git push origin refs/tags/builder-latest --force
