name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Chrome Web Store (true = publish, false = draft only)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, Zip & Release Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - run: bun run validate:public-release

      - name: Resolve release asset name
        id: asset
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "filename=coop-extension-${GITHUB_REF_NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "filename=coop-extension-public-release.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Package extension
        run: |
          bun run ./scripts/package-extension.ts public-release --filename "${{ steps.asset.outputs.filename }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/extension/dist/archives/${{ steps.asset.outputs.filename }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true

      - name: Upload to Chrome Web Store
        if: >
          (github.ref_type == 'tag' || github.event.inputs.publish == 'true')
          && secrets.CHROME_EXTENSION_ID != ''
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          # Get access token
          ACCESS_TOKEN=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Upload zip to Chrome Web Store
          UPLOAD_RESULT=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T "packages/extension/dist/archives/${{ steps.asset.outputs.filename }}" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}")

          HTTP_CODE=$(echo "$UPLOAD_RESULT" | tail -1)
          BODY=$(echo "$UPLOAD_RESULT" | sed '$d')
          echo "Upload response (HTTP ${HTTP_CODE}): ${BODY}"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Chrome Web Store upload failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

          # Publish (move from draft to public)
          PUBLISH_RESULT=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish")

          HTTP_CODE=$(echo "$PUBLISH_RESULT" | tail -1)
          BODY=$(echo "$PUBLISH_RESULT" | sed '$d')
          echo "Publish response (HTTP ${HTTP_CODE}): ${BODY}"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Chrome Web Store publish returned HTTP ${HTTP_CODE} — may need manual review"
          fi
