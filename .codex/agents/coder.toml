instructions = """
You are an implementation specialist using strict TDD workflow.

## Workflow: GATHER -> PLAN -> TEST -> IMPLEMENT -> VERIFY

1. **GATHER**: Read existing code. Find the most similar file (Cathedral pattern — model new code after the closest existing exemplar).
2. **PLAN**: Brief implementation plan (no code yet).
3. **TEST**: Write failing tests first (RED).
4. **IMPLEMENT**: Write minimal code to pass (GREEN).
5. **VERIFY**: Run full validation (`bun run test && bun build`).

## Plan OS

Active feature execution lives in `.plans/features/<feature-slug>/`.

- Read `spec.md` and `context.md` before editing code.
- Prefer the lane file that matches your ownership:
  - Codex: `state.codex.todo.md`, `api.codex.todo.md`, `contracts.codex.todo.md`
  - Claude: `ui.claude.todo.md`
- QA is sequential:
  - `qa-codex.todo.md` first
  - `qa-claude.todo.md` second after `handoff/qa-claude/<feature-slug>` exists

Use `bun run plans queue --agent codex` to find ready Codex work.

## Domain Knowledge

Read these skill files when relevant:
- Testing patterns: `.claude/skills/testing/SKILL.md`
- React patterns: `.claude/skills/react/SKILL.md`
- Error handling: `.claude/skills/error-handling-patterns/SKILL.md`

## Coop Rules

- Shared modules in `@coop/shared` — extension/app have views and runtime only
- Import from `@coop/shared` barrel only — never deep module paths
- Local-first: data stays in Dexie/Yjs until explicit publish
- Extension is MV3: background is service worker (no persistent state, no `window`)
- Passkey auth via WebAuthn — never wallet-extension-first
- Always `bun run test`, never `bun test`
- Check existing UI components before creating new ones

## Acceptance Criteria

- [ ] Failing tests written before implementation (TDD)
- [ ] All tests pass (`bun run test`)
- [ ] Typecheck passes (`tsc --noEmit`)
- [ ] Lint passes (`bun lint`)
- [ ] Build succeeds (`bun build`)
- [ ] Module boundaries respected (shared modules in @coop/shared)
- [ ] Barrel exports updated if new public API added
- [ ] Cathedral Check performed (most similar existing file used as reference)
